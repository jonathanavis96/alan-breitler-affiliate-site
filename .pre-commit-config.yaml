# Pre-commit hooks
#
# Docs: https://pre-commit.com/

repos:
  # ==========================================================================
  # Shell
  # ==========================================================================
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.9.0.6
    hooks:
      - id: shellcheck
        name: shellcheck
        description: Static analysis for shell scripts
        args: ["-e", "SC1091"] # Don't fail on sourced files that can't be found
        files: \.(sh|bash)$

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.7.0-4
    hooks:
      - id: shfmt
        name: shfmt
        description: Shell script formatter (check only, no auto-fix)
        args: ["-d", "-i", "2", "-ci"] # diff mode, 2-space indent, case indent

  # ==========================================================================
  # Markdown
  # ==========================================================================
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.39.0
    hooks:
      - id: markdownlint
        name: markdownlint
        description: Markdown linter
        args: ["--config", ".markdownlint.yaml"]

  # ==========================================================================
  # YAML
  # ==========================================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
        name: check-yaml
        description: Validate YAML files
        args: ["--allow-multiple-documents"]

      - id: end-of-file-fixer
        name: end-of-file-fixer
        description: Ensure files end with a newline

      - id: trailing-whitespace
        name: trailing-whitespace
        description: Trim trailing whitespace

      - id: check-added-large-files
        name: check-added-large-files
        description: Prevent giant files from being committed
        args: ["--maxkb=1024"]

      - id: check-merge-conflict
        name: check-merge-conflict
        description: Check for merge conflict markers

      - id: check-case-conflict
        name: check-case-conflict
        description: Check for file name case conflicts

      - id: check-executables-have-shebangs
        name: check-executables-have-shebangs
        description: Check executables have shebangs

      - id: check-shebang-scripts-are-executable
        name: check-shebang-scripts-are-executable
        description: Check scripts with shebangs are executable

  # ==========================================================================
  # Python
  # ==========================================================================
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.6
    hooks:
      - id: ruff
        name: ruff
        description: Python linter (fast)
        args: ["--fix", "--exit-non-zero-on-fix"]

      - id: ruff-format
        name: ruff-format
        description: Python formatter

default_language_version:
  python: python3

default_install_hook_types: [pre-commit, commit-msg]

# CI configuration - fail fast
ci:
  autofix_commit_msg: "style: auto-fix from pre-commit hooks"
  autoupdate_commit_msg: "chore: update pre-commit hooks"
